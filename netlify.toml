# Static marketing + UI shell for SpectraMatch (analysis runs in desktop app).
# Connect repo https://github.com/SpectraMatch2026/3.0.0 to Netlify; use defaults below.

[build]
  command = "python tools/build_netlify_site.py"
  publish = "netlify_publish"

[build.environment]
  PYTHON_VERSION = "3.12"

# Pretty URL for the datasheets page
[[redirects]]
  from = "/datasheets"
  to = "/datasheets/"
  status = 301
  force = true

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
